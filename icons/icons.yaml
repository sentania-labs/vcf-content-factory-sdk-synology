# Icon mapping for the Synology DiskStation adapter.
#
# Keys correspond to describe.xml ResourceKind key attributes.
# Values are icon filenames resolved against:
#   1. This directory (project-specific overrides)
#   2. vcfops_managementpacks/templates/icons/ (shared library)
#
# The adapter instance kind (type=7) also drives the AdapterKind icon.

adapter_kind_icon: nas.svg

resource_kinds:
  synology_diskstation: nas.svg        # adapter instance (type=7)
  SynologyWorld:        nas.svg
  SynologyDiskstation:  nas.svg
  SynologyStoragePool:  storage_pool.svg
  SynologyVolume:       datastore.svg
  SynologyDisk:         disk.svg
  SynologyIscsiLun:     iscsi_lun.svg
  SynologyNfsExport:    nfs_export.svg
  SynologyUps:          ups.svg
  SynologySsdCache:     storage_pool.svg
